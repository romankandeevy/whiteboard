<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WHITE — Вход</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-logo">WHITE</div>

    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login">Войти</button>
        <button class="auth-tab" id="tab-register">Регистрация</button>
      </div>

      <!-- Форма входа -->
      <form class="auth-form" id="form-login">
        <div class="auth-field">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="auth-field">
          <label for="login-password">Пароль</label>
          <input type="password" id="login-password" placeholder="••••••" autocomplete="current-password">
        </div>
        <div class="auth-error" id="login-error"></div>
        <button type="submit" class="auth-submit">Войти</button>
      </form>

      <!-- Форма регистрации -->
      <form class="auth-form hidden" id="form-register">
        <div class="auth-field">
          <label for="reg-name">Имя</label>
          <input type="text" id="reg-name" placeholder="Ваше имя" autocomplete="name">
        </div>
        <div class="auth-field">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="auth-field">
          <label for="reg-password">Пароль</label>
          <input type="password" id="reg-password" placeholder="минимум 6 символов" autocomplete="new-password">
        </div>
        <div class="auth-error" id="reg-error"></div>
        <button type="submit" class="auth-submit">Создать аккаунт</button>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    const tabLogin    = document.getElementById('tab-login');
    const tabReg      = document.getElementById('tab-register');
    const formLogin   = document.getElementById('form-login');
    const formReg     = document.getElementById('form-register');

    tabLogin.addEventListener('click', () => {
      tabLogin.classList.add('active'); tabReg.classList.remove('active');
      formLogin.classList.remove('hidden'); formReg.classList.add('hidden');
    });
    tabReg.addEventListener('click', () => {
      tabReg.classList.add('active'); tabLogin.classList.remove('active');
      formReg.classList.remove('hidden'); formLogin.classList.add('hidden');
    });

    formLogin.addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('login-error');
      err.textContent = '';
      try {
        const res = await API.login(
          document.getElementById('login-email').value,
          document.getElementById('login-password').value
        );
        API.saveToken(res.token);
        window.location.href = '/dashboard.html';
      } catch (e) {
        err.textContent = e.message;
      }
    });

    formReg.addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('reg-error');
      err.textContent = '';
      try {
        const res = await API.register(
          document.getElementById('reg-name').value,
          document.getElementById('reg-email').value,
          document.getElementById('reg-password').value
        );
        API.saveToken(res.token);
        window.location.href = '/dashboard.html';
      } catch (e) {
        err.textContent = e.message;
      }
    });
  </script>
</body>
</html>
